name: 建売専門HP 価格変動チェック

on:
  schedule:
    # 1日3回実行（JST 9:00 / 13:00 / 19:00 = UTC 0:00 / 4:00 / 10:00）
    # 30件 × 3回 = 90件/日 → 342件を約4日で全件チェック
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 10 * * *'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  price-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 価格変動チェックを実行
        run: |
          echo "価格チェック開始: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SYNC_API_URL }}/api/tateuri/cron/price-check")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTPステータス: $HTTP_CODE"
          echo "レスポンス: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 価格チェック失敗 (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "✅ 価格チェック完了"
